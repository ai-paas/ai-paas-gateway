services:
  # AI PaaS Gateway Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # 외부포트:컨테이너포트
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE_ENABLED=${LOG_FILE_ENABLED:-false}
      - LOG_ACCESS_ENABLED=${LOG_ACCESS_ENABLED:-true}
      - LOG_UVICORN_ACCESS_ENABLED=${LOG_UVICORN_ACCESS_ENABLED:-false}
      - LOG_JSON_FORMAT=${LOG_JSON_FORMAT:-true}
      - LOG_ACCESS_MASK_PATHS=${LOG_ACCESS_MASK_PATHS:-["/api/v1/auth/login","/api/v1/auth/refresh","/api/v1/auth/logout"]}
      # CORS
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX:-}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - CORS_ALLOW_METHODS=${CORS_ALLOW_METHODS:-*}
      - CORS_ALLOW_HEADERS=${CORS_ALLOW_HEADERS:-*}
      # Auth
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - AUTH_REFRESH_COOKIE_NAME=${AUTH_REFRESH_COOKIE_NAME:-refresh_token}
      - AUTH_REFRESH_COOKIE_HTTPONLY=${AUTH_REFRESH_COOKIE_HTTPONLY:-true}
      - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
      - AUTH_REFRESH_COOKIE_SAMESITE=${AUTH_REFRESH_COOKIE_SAMESITE:-lax}
      - AUTH_REFRESH_COOKIE_DOMAIN=${AUTH_REFRESH_COOKIE_DOMAIN:-}
      - AUTH_REFRESH_COOKIE_PATH=${AUTH_REFRESH_COOKIE_PATH:-/api/v1/auth}
      - AUTH_REFRESH_COOKIE_MAX_AGE=${AUTH_REFRESH_COOKIE_MAX_AGE:-604800}
      # Proxy
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - PROXY_TARGET_BASE_URL=${PROXY_TARGET_BASE_URL:-}
      - PROXY_TARGET_PATH_PREFIX=${PROXY_TARGET_PATH_PREFIX:-/api/v1}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT:-30.0}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-5.0}
      - EXTERNAL_API_USERNAME=${EXTERNAL_API_USERNAME:-}
      - EXTERNAL_API_PASSWORD=${EXTERNAL_API_PASSWORD:-}
      # HUB Connect
      - HUB_CONNECT_ENABLED=${HUB_CONNECT_ENABLED:-false}
      - HUB_CONNECT_TARGET_BASE_URL=${HUB_CONNECT_TARGET_BASE_URL:-}
      - HUB_CONNECT_TARGET_PATH_PREFIX=${HUB_CONNECT_TARGET_PATH_PREFIX:-/api/v1}
      - HUB_CONNECT_TIMEOUT=${HUB_CONNECT_TIMEOUT:-30.0}
      - HUB_CONNECT_CONNECT_TIMEOUT=${HUB_CONNECT_CONNECT_TIMEOUT:-5.0}
      - HUB_CONNECT_API_USERNAME=${HUB_CONNECT_API_USERNAME:-}
      - HUB_CONNECT_API_PASSWORD=${HUB_CONNECT_API_PASSWORD:-}
      # Any Cloud
      - ANY_CLOUD_ENABLED=${ANY_CLOUD_ENABLED:-false}
      - ANY_CLOUD_TARGET_BASE_URL=${ANY_CLOUD_TARGET_BASE_URL:-}
      - ANY_CLOUD_TIMEOUT=${ANY_CLOUD_TIMEOUT:-30.0}
      - ANY_CLOUD_CONNECT_TIMEOUT=${ANY_CLOUD_CONNECT_TIMEOUT:-5.0}
      # Lite Model
      - LITE_MODEL_ENABLED=${LITE_MODEL_ENABLED:-false}
      - LITE_MODEL_TARGET_BASE_URL=${LITE_MODEL_TARGET_BASE_URL:-}
      - LITE_MODEL_TIMEOUT=${LITE_MODEL_TIMEOUT:-30.0}
      - LITE_MODEL_CONNECT_TIMEOUT=${LITE_MODEL_CONNECT_TIMEOUT:-5.0}
    volumes:
      - .:/app  # Mount source code for development
    restart: unless-stopped